<!DOCTYPE html>
<html>
  <head>
    <title>ESP Wi-Fi Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
 <!--   
    <link rel="stylesheet" type="text/css" href="/WiFiPortal/style.css">
    <link rel="stylesheet" type="text/css" href="/style.css">
 -->   

    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="../style.css">

  </head>
  <body>
    <header>
      <h1>ESP Wi-Fi Manager</h1>
    </header>
    <nav>
      <a href="/"><button>Go to HOME page</button></a>
    </nav>
    <div class="content">
      <div class="card-grid">
        <div class="card">
          <form action="/WiFiConnect" method="POST" class="WiFi-form">
            <legend class="card-title">WiFi Network</legend>
            <label for="ssid">SSID
              <input type="text" id ="ssid" name="ssid"><br>
            </label>
            <label for="pass">Password
              <input type="password" id ="pass" name="pass"><br>
            </label>
            <input type ="submit" value ="Submit">
          </form>
        </div>
        <div class="card">
          <form action="/WiFiConfig" method="POST" class="WiFi-form">
            <legend class="card-title">WiFi Static configuration</legend>
            <table style="width: 100%;">
              <tr>
                <td>
                  <label for="ip">IP Address</label>
                </td>
                <td>
                  <input type="text" id ="ip" name="ip" value="192.168.1.200"><br>
                </td>
              </tr>
            </table>

            <label for="gateway">Gateway Address</label>
            <input type="text" id ="gateway" name="gateway" value="192.168.1.1"><br>
            <label for="pass">Subnet mask</label>
            <input type="text" id ="subnet" name="subnet"><br>
            <label for="pass">DNS</label>
            <input type="text" id ="dns" name="dns"><br>
            <label for="pass">DNS 2</label>
            <input type="text" id ="dns2" name="dns2"><br>
            <input type ="submit" value ="Submit">
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
